<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chun Min Jun</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    .wrap {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .menu {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .item {
      display: block;
      width: 100%;
      padding: 18px 16px;
      text-align: center;
      text-decoration: none;
      border: none;
      border-radius: 12px;
      background: #222;
      color: #fff;
      font-size: 18px;
      font-weight: 600;
      line-height: 1.4;
      cursor: pointer;
    }

    button.item {
      opacity: 1;
    }

    #timer {
      word-break: keep-all;
      font-size: 17px;
    }

    @media (max-width: 480px) {
      .wrap {
        padding: 16px;
      }

      .item {
        padding: 20px 16px;
        font-size: 18px;
      }

      #timer {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="menu">
      <a
        class="item"
        href="https://www.b2bmro.kr"
        target="_blank"
        rel="noopener noreferrer"
      >
        하는일
      </a>

      <a
        class="item"
        href="http://qr.kakao.com/talk/pLSw26cbMH.4pj_eNbVGQm4qu9Y-"
        target="_blank"
        rel="noopener noreferrer"
      >
        카카오톡
      </a>

      <a
        class="item"
        href="tel:+821041293321"
      >
        전화하기
      </a>

      <a
        class="item"
        href="mailto:minjun.chun@b2bmro.kr"
      >
        이메일
      </a>

      <button type="button" class="item" disabled>
        ISTJ
      </button>

      <div id="timer" class="item">
        남은 수명:
      </div>
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const averageLifeExpectancy = 79;
      const birthDate = new Date(1989, 9, 2);
      const deathDate = new Date(
        birthDate.getFullYear() + averageLifeExpectancy,
        birthDate.getMonth(),
        birthDate.getDate()
      );

      function updateTimer() {
        const now = new Date();
        const timeRemaining = deathDate.getTime() - now.getTime();

        if (timeRemaining > 0) {
          const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

          document.getElementById("timer").textContent =
            `남은 수명: ${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
        } else {
          document.getElementById("timer").textContent = "수명이 종료되었습니다.";
        }
      }

      updateTimer();
      setInterval(updateTimer, 1000);
    });
  </script>
</body>
</html>
