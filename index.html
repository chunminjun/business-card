      <button type="button" disabled
         style="
          display:block;

        ISTJ
      </button>

      <div id="timer"
         style="
          display:block;
          width:100%;
          padding:18px;
          text-align:center;
          border:none;
          border-radius:12px;
          background-color:#222;
          color:#fff;
          font-size:clamp(17px, 4vw, 20px);
          font-weight:600;
          line-height:1.6;
          box-sizing:border-box;
          word-break:keep-all;
         ">
        남은 수명:
      </div>

    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const averageLifeExpectancy = 79;
      const birthDate = new Date(1989, 9, 2);
      const deathDate = new Date(
        birthDate.getFullYear() + averageLifeExpectancy,
        birthDate.getMonth(),
        birthDate.getDate()
      );

      function updateTimer() {
        const now = new Date();
        const timeRemaining = deathDate.getTime() - now.getTime();

        if (timeRemaining > 0) {
          const days = Math.floor(timeRemaining / (1000 * 60 * 60 * 24));
          const hours = Math.floor((timeRemaining % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
          const minutes = Math.floor((timeRemaining % (1000 * 60 * 60)) / (1000 * 60));
          const seconds = Math.floor((timeRemaining % (1000 * 60)) / 1000);

          document.getElementById("timer").textContent =
            `남은 수명: ${days}일 ${hours}시간 ${minutes}분 ${seconds}초`;
        } else {
          document.getElementById("timer").textContent = "수명이 종료되었습니다.";
        }
      }

      setInterval(updateTimer, 1000);
      updateTimer();
    });
  </script>

</body>
